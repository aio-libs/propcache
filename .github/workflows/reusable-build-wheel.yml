---

name: Build wheel

on:
  workflow_call:
    inputs:
      dists-artifact-name:
        description: Workflow artifact name containing dists
        required: true
        type: string
      cython-tracing:
        description: Whether to build Cython modules with line tracing
        default: '0'
        required: false
        type: string
      os:
        description: VM OS to use, without version suffix
        default: ubuntu-latest
        required: false
        type: string
      qemu:
        description: Emulated QEMU architecture
        default: ''
        required: false
        type: string
      native-arch:
        description: >-
          Whether the runner natively executes the architecture named
          by ``qemu`` (so the QEMU userspace handler does not need to
          be registered). Defaults to ``false``.
        default: false
        required: false
        type: boolean
      tag:
        description: Build platform tag wheels
        default: ''
        required: false
        type: string
      source-tarball-name:
        description: Sdist filename wildcard
        required: true
        type: string
      wheel-tags-to-skip:
        description: Wheel tags to skip building
        default: ''
        required: false
        type: string

env:
  FORCE_COLOR: "1"  # Make tools pretty.
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"

jobs:

  build-wheel:
    name: >-
     Build ${{ inputs.tag }} wheels on ${{ inputs.os }} ${{ inputs.qemu }}
    runs-on: ${{ inputs.os }}
    timeout-minutes: ${{ inputs.qemu && 60 || 20 }}
    steps:
    - name: Retrieve the project source from an sdist inside the GHA artifact
      uses: re-actors/checkout-python-sdist@release/v2
      with:
        source-tarball-name: ${{ inputs.source-tarball-name }}
        workflow-artifact-name: ${{ inputs.dists-artifact-name }}

    - name: Set up QEMU
      if: inputs.qemu && ! inputs.native-arch
      uses: docker/setup-qemu-action@v4
      with:
        platforms: all
        # This should be temporary
        # xref https://github.com/docker/setup-qemu-action/issues/188
        # xref https://github.com/tonistiigi/binfmt/issues/215
        image: tonistiigi/binfmt:qemu-v8.1.5
      id: qemu
    - name: Prepare cross-arch build environment
      if: inputs.qemu
      run: |
        # Tell cibuildwheel which Linux arch to build for; the default
        # of "auto" would only build the host arch, but the odd-arch
        # matrix may pin a different target even when running natively.
        echo "CIBW_ARCHS_LINUX=${{ inputs.qemu }}" >> "${GITHUB_ENV}"
        # Override pyproject.toml's `build[uv]` because the pypa odd-arch
        # manylinux/musllinux container images (as of the 2026.03.20-1
        # tag) do not ship `uv` preinstalled; without this override
        # cibuildwheel fails with `Command ['which', 'uv'] failed with
        # code 1` inside those containers. The container image is the
        # same whether the host runs natively or under QEMU, so this
        # override is still required on native ARM runners.
        echo "CIBW_BUILD_FRONTEND=build" >> "${GITHUB_ENV}"
      shell: bash

    - name: Skip building some wheel tags
      if: inputs.wheel-tags-to-skip
      run: |
        echo "CIBW_SKIP=${{ inputs.wheel-tags-to-skip }}" >> "${GITHUB_ENV}"
      shell: bash

    - name: Build wheels
      uses: pypa/cibuildwheel@v4.0.0
      with:
        # `build-frontend = "build[uv]"` (pyproject.toml) requires uv to be
        # available on the runner for Windows and macOS. Installing
        # cibuildwheel with the `uv` extra bundles uv with it; the
        # tested-arch manylinux/musllinux containers also ship uv
        # preinstalled. The odd-arch containers do not, so the
        # `Prepare emulation` step above overrides
        # `CIBW_BUILD_FRONTEND=build` when QEMU is in play.
        extras: uv
      env:
        CIBW_ARCHS_MACOS: x86_64 arm64 universal2
        CIBW_CONFIG_SETTINGS: >-  # Cython line tracing for coverage collection
          pure-python=false
          with-cython-tracing=${{ inputs.cython-tracing }}

    - name: Upload built artifacts for testing and publishing
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.dists-artifact-name }}-
          ${{ inputs.os }}-
          ${{ inputs.qemu }}-
          ${{ inputs.tag }}
        path: ./wheelhouse/*.whl

...
