---

name: Build wheel

on:
  workflow_call:
    inputs:
      dists-artifact-name:
        description: Workflow artifact name containing dists
        required: true
        type: string
      cython-tracing:
        description: Whether to build Cython modules with line tracing
        default: '0'
        required: false
        type: string
      os:
        description: VM OS to use, without version suffix
        default: ubuntu-latest
        required: false
        type: string
      qemu:
        description: Emulated QEMU architecture
        default: ''
        required: false
        type: string
      tag:
        description: Build platform tag wheels
        default: ''
        required: false
        type: string
      source-tarball-name:
        description: Sdist filename wildcard
        required: true
        type: string
      wheel-tags-to-skip:
        description: Wheel tags to skip building
        default: ''
        required: false
        type: string

env:
  FORCE_COLOR: "1"  # Make tools pretty.
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"

jobs:

  build-wheel:
    name: >-
     Build ${{ inputs.tag }} wheels on ${{ inputs.os }} ${{ inputs.qemu }}
    runs-on: ${{ inputs.os }}
    timeout-minutes: ${{ inputs.qemu && 60 || 20 }}
    steps:
    - name: Retrieve the project source from an sdist inside the GHA artifact
      uses: re-actors/checkout-python-sdist@release/v2
      with:
        source-tarball-name: ${{ inputs.source-tarball-name }}
        workflow-artifact-name: ${{ inputs.dists-artifact-name }}

    - name: Set up QEMU
      if: inputs.qemu
      uses: docker/setup-qemu-action@v4
      with:
        platforms: all
        # This should be temporary
        # xref https://github.com/docker/setup-qemu-action/issues/188
        # xref https://github.com/tonistiigi/binfmt/issues/215
        image: tonistiigi/binfmt:qemu-v8.1.5
      id: qemu
    - name: Prepare emulation
      if: inputs.qemu
      run: |
        # Build emulated architectures only if QEMU is set,
        # use default "auto" otherwise
        echo "CIBW_ARCHS_LINUX=${{ inputs.qemu }}" >> "${GITHUB_ENV}"
      shell: bash

    - name: Skip building some wheel tags
      if: inputs.wheel-tags-to-skip
      run: |
        echo "CIBW_SKIP=${{ inputs.wheel-tags-to-skip }}" >> "${GITHUB_ENV}"
      shell: bash

    # Compiler cache for the C extension: each wheel-build job compiles the
    # same `_helpers_c.c` once per Python ABI. With ccache, a warm cache turns
    # ~25-40 s of per-ABI recompilation into a sub-second hit when neither the
    # generated `.c`, the `Python.h` for that ABI, nor the toolchain has
    # changed. Skipped under QEMU because the host cache holds foreign-arch
    # objects. Windows is not wired up: setuptools' MSVCCompiler invokes
    # cl.exe directly and ignores CC/CXX, so a sccache integration there
    # requires a cl.exe shim and is left as a separate piece of work.
    - name: Set up ccache
      if: runner.os != 'Windows' && !inputs.qemu
      uses: hendrikmuhs/ccache-action@v1
      with:
        key: >-
          ccache-${{ inputs.os }}-${{ inputs.tag
          }}-${{ inputs.cython-tracing }}
        max-size: 200M

    - name: Wire ccache into the cibuildwheel Linux container
      # `cibuildwheel` already mounts the host filesystem at `/host` inside
      # the manylinux/musllinux build container, so the cache dir set up by
      # `hendrikmuhs/ccache-action` on the runner is reachable at
      # `/host${cache_dir}`. The in-container ccache (installed via
      # `before-all` in `pyproject.toml`) reads and writes through that
      # mount. The cache dir is read straight from `ccache --get-config`
      # because the action does not export `CCACHE_DIR` to `GITHUB_ENV`.
      if: runner.os == 'Linux' && !inputs.qemu
      run: |
        host_cache="$(ccache --get-config cache_dir)"
        cc_dirs="/usr/lib64/ccache:/usr/lib/ccache/bin:/usr/lib/ccache"
        cibw_env="PATH=${cc_dirs}:\$PATH CCACHE_DIR=/host${host_cache}"
        echo "CIBW_ENVIRONMENT_LINUX=${cibw_env}" >> "${GITHUB_ENV}"
      shell: bash

    - name: Build wheels
      uses: pypa/cibuildwheel@v3.4.1
      env:
        CIBW_ARCHS_MACOS: x86_64 arm64 universal2
        CIBW_CONFIG_SETTINGS: >-  # Cython line tracing for coverage collection
          pure-python=false
          with-cython-tracing=${{ inputs.cython-tracing }}

    - name: Upload built artifacts for testing and publishing
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.dists-artifact-name }}-
          ${{ inputs.os }}-
          ${{ inputs.qemu }}-
          ${{ inputs.tag }}
        path: ./wheelhouse/*.whl

...
