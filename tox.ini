# SPDX-License-Identifier: Apache-2.0
#
# This is the tox configuration file for propcache. It describes the
# project's developer-facing automation entrypoints — test, lint, docs
# building, benchmarking, distribution building, and Cython source
# regeneration. ``make`` targets at the repo root invoke tox under the
# hood; see ``Makefile`` for the thin wrappers kept for muscle-memory.
#
# Quick reference (Python versions / variants follow the test matrix
# in CI):
#
#   tox                       # default envs (py3X-{pure,compiled}, lint)
#   tox -e py312-compiled     # run tests against the C-extension build
#   tox -e py312-pure         # run tests against the pure-Python build
#   tox -e lint               # run pre-commit on all files
#   tox -e cython             # regenerate ``*.c`` from ``*.pyx``
#   tox -e build-dists        # produce sdist + pure-python wheel
#   tox -e docs               # build the HTML docs
#   tox -e doctest            # run the Sphinx doctest builder
#   tox -e spelling           # run the Sphinx spelling checker
#   tox -e benchmark          # run pytest-codspeed benchmarks
#   tox devenv -e py312-compiled venv  # provision an editable dev venv
#
# Implementation notes:
#
# * The ``pure``/``compiled`` variants differ only in the PEP 517
#   ``pure-python`` config setting. The ``packaging/pep517_backend``
#   build hooks consume that flag and either skip or run the Cython
#   compile step. Tests then exercise whichever flavour was installed
#   into the env.
# * tox 4 propagates ``PIP_CONSTRAINT`` through pip's environment; we
#   set it to ``requirements/cython.txt`` so every install path is
#   bounded by the project's canonical Cython pin without duplicating
#   it across requirements files.
# * ``passenv`` is intentionally narrow — only the colour / CI signals
#   that downstream tools care about. New variables should be added
#   here explicitly rather than via a catch-all wildcard.

[tox]
envlist =
    lint
    py310-pure
    py310-compiled
    py311-pure
    py311-compiled
    py312-pure
    py312-compiled
    py313-pure
    py313-compiled
    py314-pure
    py314-compiled
isolated_build = true
minversion = 4.4.0
skip_missing_interpreters = true


[testenv]
description =
    Run the test suite against propcache
    (pure-Python build when factor ``pure`` is present,
    C-extension build for factor ``compiled``)
package = wheel
deps =
    -r requirements/test.txt
passenv =
    CI
    COLOR
    FORCE_COLOR
    GITHUB_*
    MYPY_FORCE_COLOR
    NO_COLOR
    PIP_CONSTRAINT
    PRE_COMMIT_COLOR
    PY_COLORS
    PYTEST_*
    PYTHONIOENCODING
    PYTHONUTF8
setenv =
    COVERAGE_FILE = {toxworkdir}/.coverage.{envname}
    # Tox 4 only forwards the literal ``PIP_CONSTRAINT`` value from the
    # outer environment; this provides the project default while still
    # letting CI override it.
    PIP_CONSTRAINT = {env:PIP_CONSTRAINT:requirements/cython.txt}
    # Make sure tests cannot accidentally rely on resources outside the
    # working tree by isolating ``HOME`` per env.
    HOME = {envtmpdir}/home
commands_pre =
    # Keep the test runner from picking up build artefacts that may
    # belong to a different Python implementation in the workspace.
    python -B -c \
        "import pathlib, shutil; \
        [shutil.rmtree(p, ignore_errors=True) for p in pathlib.Path('build').glob('*')]"
commands =
    python -B -m pytest \
        pure: --no-c-extensions \
        compiled: --c-extensions \
        --junitxml={toxworkdir}/.tmp/.test-results/pytest-{envname}/junit.xml \
        --cov-report=term-missing:skip-covered \
        --cov-report=xml:{toxworkdir}/.tmp/.test-results/pytest-{envname}/coverage.xml \
        {tty:--color=yes} \
        {posargs:tests/}
# Route each variant to its dedicated packaging env so a single wheel
# is reused across the matching minor Python versions instead of being
# rebuilt for every interpreter.
wheel_build_env =
    pure: .pkg-pure
    compiled: .pkg-compiled


[testenv:.pkg-pure]
# Builds a wheel with the PEP 517 ``pure-python`` toggle set so the
# Cython compile step (and its build dependency) is skipped entirely.
# All ``get_requires_*`` / ``prepare_metadata_*`` / ``build_*`` hooks
# need to see the same setting, otherwise the early hooks will
# advertise the Cython build requirement unconditionally.
config_settings_get_requires_for_build_sdist = pure-python=true
config_settings_get_requires_for_build_wheel = pure-python=true
config_settings_prepare_metadata_for_build_wheel = pure-python=true
config_settings_build_sdist = pure-python=true
config_settings_build_wheel = pure-python=true
pass_env =
    PIP_CONSTRAINT
set_env =
    PIP_CONSTRAINT = {env:PIP_CONSTRAINT:requirements/cython.txt}


[testenv:.pkg-compiled]
# Builds an accelerated wheel with the C-extension produced via the
# in-tree PEP 517 build backend.
config_settings_get_requires_for_build_sdist = pure-python=false
config_settings_get_requires_for_build_wheel = pure-python=false
config_settings_prepare_metadata_for_build_wheel = pure-python=false
config_settings_build_sdist = pure-python=false
config_settings_build_wheel = pure-python=false
pass_env =
    PIP_CONSTRAINT
set_env =
    PIP_CONSTRAINT = {env:PIP_CONSTRAINT:requirements/cython.txt}


[testenv:lint]
description = Run pre-commit hooks against the whole tree
package = skip
skip_install = true
deps =
    -r requirements/lint.txt
passenv =
    {[testenv]passenv}
    HOMEPATH
    PROGRAMDATA
    SKIP
    SSH_AUTH_SOCK
    USERPROFILE
setenv =
    {[testenv]setenv}
    # pre-commit stores its hook envs under ``~/.cache/pre-commit`` by
    # default; redirect them into the tox work directory so repeated
    # runs are cache-friendly and don't pollute ``HOME``.
    PRE_COMMIT_HOME = {env:PRE_COMMIT_HOME:{toxworkdir}/.pre-commit}
    # pre-commit spawns sub-pip invocations from each hook's isolated
    # environment, in which the relative ``requirements/cython.txt``
    # path used as the project-wide ``PIP_CONSTRAINT`` cannot be
    # resolved. Clear the variable in this env so hook setup succeeds.
    PIP_CONSTRAINT =
commands =
    pre-commit run \
        --all-files \
        --show-diff-on-failure \
        {posargs}


[testenv:cython]
description = Regenerate ``*.c`` files from ``*.pyx`` Cython sources
package = skip
skip_install = true
deps =
    -r requirements/cython.txt
commands =
    cython \
        -3 \
        -I src/propcache \
        {posargs:src/propcache/_helpers_c.pyx}


[testenv:build-dists]
description = Produce an sdist and a pure-Python wheel under ./dist
package = skip
skip_install = true
deps =
    build >= 1.2
passenv =
    {[testenv]passenv}
setenv =
    {[testenv]setenv}
commands_pre =
    python -B -c \
        "import pathlib, shutil; \
        shutil.rmtree(pathlib.Path('dist'), ignore_errors=True)"
commands =
    python -m build \
        --config-setting=pure-python=true \
        {posargs}


[testenv:docs]
description = Build the HTML documentation
# Sphinx imports the package, so install it (pure-python is enough).
package = wheel
wheel_build_env = .pkg-pure
deps =
    -r requirements/doc.txt
passenv =
    {[testenv]passenv}
    READTHEDOCS
    READTHEDOCS_*
setenv =
    {[testenv]setenv}
commands =
    sphinx-build \
        -j auto \
        -b html \
        -W --keep-going \
        -n \
        {tty:--color} \
        -d {toxworkdir}/.tmp/sphinx-doctrees \
        docs \
        {toxworkdir}/docs/html \
        {posargs}


[testenv:doctest]
description = Run the Sphinx doctest builder
package = {[testenv:docs]package}
wheel_build_env = {[testenv:docs]wheel_build_env}
deps = {[testenv:docs]deps}
passenv = {[testenv:docs]passenv}
setenv = {[testenv:docs]setenv}
commands =
    sphinx-build \
        -j auto \
        -b doctest \
        -W --keep-going \
        -n \
        {tty:--color} \
        -d {toxworkdir}/.tmp/sphinx-doctrees \
        docs \
        {toxworkdir}/docs/doctest \
        {posargs}


[testenv:spelling]
description = Run the Sphinx spelling checker
package = {[testenv:docs]package}
wheel_build_env = {[testenv:docs]wheel_build_env}
deps =
    -r requirements/doc-spelling.txt
passenv = {[testenv:docs]passenv}
setenv = {[testenv:docs]setenv}
commands =
    sphinx-build \
        -j auto \
        -b spelling \
        -W --keep-going \
        -n \
        {tty:--color} \
        -d {toxworkdir}/.tmp/sphinx-doctrees \
        docs \
        {toxworkdir}/docs/spelling \
        {posargs}


[testenv:benchmark]
description = Run the codspeed-instrumented benchmarks
# Use the accelerated build because the benchmarks should reflect the
# shipped artefact, not the pure-Python fallback.
package = wheel
wheel_build_env = .pkg-compiled
deps =
    -r requirements/codspeed.txt
passenv =
    {[testenv]passenv}
    CODSPEED_*
setenv =
    {[testenv]setenv}
commands =
    python -m pytest \
        --no-cov \
        --codspeed \
        {tty:--color=yes} \
        {posargs:tests/}
